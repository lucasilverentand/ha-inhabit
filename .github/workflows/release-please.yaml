name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Assign release pull request
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
          RELEASE_PRS: ${{ steps.release.outputs.prs }}
        run: |
          release_prs="${RELEASE_PRS:-}"
          if [ -z "$release_prs" ] || [ "$release_prs" = "null" ]; then
            release_prs="${RELEASE_PR:-null}"
          fi

          jq -r 'if type == "array" then .[]?.number else .number? end' <<< "$release_prs" |
            while read -r pr_number; do
              [ -n "$pr_number" ] || continue
              gh pr edit "$pr_number" --repo "$GITHUB_REPOSITORY" --add-assignee lucasilverentand
            done

  build-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Update manifest version
        run: |
          VERSION="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix
          python -c "
          import json
          with open('custom_components/inhabit/manifest.json', 'r') as f:
              manifest = json.load(f)
          manifest['version'] = '$VERSION'
          with open('custom_components/inhabit/manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          "

      - name: Create release artifact
        run: |
          mkdir -p dist
          cp -r custom_components/inhabit dist/
          cd dist && zip -r inhabit.zip inhabit

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/inhabit.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
